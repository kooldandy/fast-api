name: FastAPI Lambda CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LAMBDA_FUNCTION_NAME: fastapi-lambda
      AWS_REGION: us-east-1
      PACKAGE_DIR: package
      ZIP_FILE: deployment.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into package directory
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t $PACKAGE_DIR

      - name: Copy application code into package directory
        run: |
          mkdir -p $PACKAGE_DIR
          cp -r main.py app $PACKAGE_DIR/

      - name: Create deployment ZIP
        run: |
          cd $PACKAGE_DIR
          zip -r ../$ZIP_FILE .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://$ZIP_FILE
